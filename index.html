<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Trang chủ - Học Tập Cùng Nhau</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                color: white;
                font-family: Arial, Helvetica, sans-serif;
                background: linear-gradient(135deg,#4892f1, #e058c3);
                background-attachment: fixed;
            }
            table {
                width: 100%;
                height: 100vh;
                border-collapse:collapse;
            }
            col.left {width: 25%;}
            col.center {width:50%;}
            col.right {width: 25%;}
            td {
                padding: 30px;
                vertical-align: middle;
            }

            .menu {
                display: flex;
                flex-direction: column;
                gap: 18px;         
                animation: fadeUp 1.2s ease;            
                background: rgba(255,255,255,0.08);           
                backdrop-filter: blur(10px);            
                border-radius: 20px;            
                padding: 30px;
            }
            .menu button {           
                padding: 16px;           
                font-size: 16px;            
                font-weight: bold;            
                border-radius: 14px;            
                border: 1px solid rgba(255,255,255,0.15);            
                background: rgba(255,255,255,0.85);            
                color: #022b53;           
                cursor: pointer;            
                transition: 0.3s;
            }
            .menu button:hover {            
                background: #f1f0b7;           
                transform: translateX(8px);
            }

            .content {            
                animation: fadeUp 1.2s ease;            
                text-align: center;            
                padding: 60px;            
                background: rgba(255,255,255,0.06);            
                backdrop-filter: blur(12px);           
                border-radius: 30px;
            }
            .title {            
                font-size: 84px;            
                letter-spacing: 6px;            
                margin-bottom: 30px;
            }
            .divider {            
                width: 140px;           
                height: 4px;            
                background: linear-gradient(to right, #f08af3,#8cb6ee);            
                margin: 0 auto 40px;           
                border-radius: 10px;
            }
            .intro {            
                font-size: 18px;            
                line-height: 1.9;            
                max-width: 720px;           
                margin: auto;            
                opacity: 0.9;
            }

            .contact-btn {
                margin-top: 40px;
                text-align: center;
            }

            .contact-btn button {
                padding: 16px 40px;
                font-size: 18px;
                font-weight: bold;
                border-radius: 30px;
                border: none;
                background: linear-gradient(135deg, #f08af3, #8cb6ee);
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

            .contact-btn button:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            }

            .media{            
                text-align: center;            
                padding: 30px;            
                animation: fadeUp 1.2s ease;            
                background: rgba(255,255,255,0.08);            
                backdrop-filter: blur(10px);            
                border-radius: 20px;            
                transition: 0.3s;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            .media h3 {            
                margin-bottom: 10px;            
                font-size: 30px;            
                color: #ffffff;
            }
            .media a {
                display: block;
                padding: 12px 20px;
                background: rgba(255,255,255,0.15);
                border-radius: 12px;
                color: white;
                text-decoration: none;
                font-weight: bold;
                border: 1px solid rgba(255,255,255,0.2);
                transition: all 0.3s;
            }
            .media a:hover {
                background: rgba(255,255,255,0.3);
                transform: translateY(-3px);
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(40px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>
        <table>
            <colgroup>
                <col class="left">
                <col class="center">
                <col class="right">
            </colgroup>

            <tr>
                <td>
                    <div class="menu">                
                        <button onclick="location.reload()">Trang chủ</button>                
                        <button onclick="window.open('https://drive.google.com/drive/folders/1xrvLAR9xWBb5nDkANsoAAPH-5n62pq5z?usp=drive_link', '_blank')">Tài liệu theo môn</button>
                        <button onclick="window.open('form.html', '_blank')">Khảo sát học tập</button>
                        <button onclick="window.open('https://gemini.google.com/', '_blank')">AI IUIK</button>
                    </div>
                </td>

                <td>
                    <div class="content">                
                        <div class="title">Học Tập Cùng Nhau</div>                
                        <div class="divider"></div>                

                        <div class="intro">
                            Đây là phần giới thiệu website.                     
                            Nơi chia sẻ tài liệu học tập, hỗ trợ học sinh trong quá trình học,                     
                            theo dõi tiến độ và ứng dụng AI để học hiệu quả hơn mỗi ngày.                
                        </div>

                        <div class="contact-btn">
                            <button onclick="window.open('Thông-tin-liên-hệ.html', '_blank')">
                                Thông tin liên hệ
                            </button>
                        </div>

                    </div>
                </td>

                <td>            
                    <div class="media">                      
                        <h3>Kênh Liên Lạc</h3>
                        <a href="https://youtube.com/" target="_blank">📺 YouTube</a>
                        <a href="https://instagram.com/" target="_blank">📸 Instagram</a>
                        <a href="https://tiktok.com/" target="_blank">🎵 TikTok</a>
                        <a href="https://facebook.com/" target="_blank">📘 Facebook</a>
                    </div>        
                </td>    
            </tr>
        </table>
    </body>
</html>
