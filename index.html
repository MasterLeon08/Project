<!DOCTYPE html>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box; }
            body {
                color: white;
                font-family: Arial, Helvetica, sans-serif;
                background: linear-gradient(135deg,#4892f1, #e058c3);
                background-attachment: fixed; }
            table {
                width: 100%;
                height: 100vh;
                border-collapse:collapse; }
            col.left {width: 25%;}
            col.center {width:50%;}
            col.right {width: 25%;}
            td {
            padding: 30px;
            vertical-align: middle;}
            .menu {
                display: flex;
                flex-direction: column;
                gap: 18px;         
                animation: fadeUp 1.2s ease;            
                background: rgba(255,255,255,0.08);           
                backdrop-filter: blur(10px);            
                border-radius: 20px;            
                padding: 30px;}
            .menu button {           
                padding: 16px;           
                font-size: 16px;            
                font-weight: bold;            
                border-radius: 14px;            
                border: 1px solid rgba(255,255,255,0.15);            
                background: rgba(255,255,255,0.85);            
                color: #022b53;           
                cursor: pointer;            
                transition: 0.3s;}
            .menu button:hover {            
                background: #f1f0b7;           
                transform: translateX(8px);}
            .content {            
                animation: fadeUp 1.2s ease;            
                text-align: center;            
                padding: 60px;            
                background: rgba(255,255,255,0.06);            
                backdrop-filter: blur(12px);           
                border-radius: 30px;}
            .title {            
                font-size: 84px;            
                letter-spacing: 6px;            
                margin-bottom: 30px;}
            .divider {            
                width: 140px;           
                height: 4px;            
                background: linear-gradient(to right, #f08af3,#8cb6ee);            
                margin: 0 auto 40px;           
                border-radius: 10px;}
            .intro {            
                font-size: 18px;            
                line-height: 1.9;            
                max-width: 720px;           
                margin: auto;            
                opacity: 0.9;}
            .media{            
                text-align: center;            
                padding: 30px;            
                animation: fadeUp 1.2s ease;            
                background: rgba(255,255,255,0.08);            
                backdrop-filter: blur(10px);            
                border-radius: 20px;            
                transition: 0.3s;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            .media h3 {            
                margin-bottom: 10px;            
                font-size: 30px;            
                color: #ffffff;}
            .media a {
                display: block;
                padding: 12px 20px;
                background: rgba(255,255,255,0.15);
                border-radius: 12px;
                color: white;
                text-decoration: none;
                font-weight: bold;
                border: 1px solid rgba(255,255,255,0.2);
                transition: all 0.3s;
            }
            .media a:hover {
                background: rgba(255,255,255,0.3);
                transform: translateY(-3px);
            }

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);}
    to {
        opacity: 1;
        transform: translateY(0);}}
